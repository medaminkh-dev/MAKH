# MakhOS GRUB2 Configuration
# Boot configuration for Multiboot2 compliant kernel

# Set timeout and default entry
timeout=5
default=0

# Menu entry for MakhOS
menuentry "MakhOS v0.0.1 - Phase 1" {
    # Load the kernel
    multiboot2 /boot/makhos.kernel
    
    # Boot the kernel
    boot
}

# Menu entry for debugging (with serial output)
menuentry "MakhOS v0.0.1 - Debug Mode" {
    multiboot2 /boot/makhos.kernel
    boot
}
